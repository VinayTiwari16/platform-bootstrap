name: Terraform Apply
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Check WIF secrets
        run: |
          if [ -z "${{ secrets.WIF_PROVIDER }}" ] || [ -z "${{ secrets.GITHUB_SA }}" ]; then
            echo "Missing GitHub secrets: WIF_PROVIDER and/or GITHUB_SA"
            echo "Please add both repository secrets before rerunning the workflow."
            exit 1
          fi
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GITHUB_SA }}

      - uses: google-github-actions/setup-gcloud@v2
      - name: Terraform Init
        run: |
          terraform init -backend-config=backend/dev.hcl

      - name: Terraform Apply
        run: |
          terraform apply auto-approve -var-file=environments/dev/terraform.tfvars
